name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:


  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: yamllint deployment.yaml


  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t flask-app:latest ./app


  trivy-deps:
    name: Scan dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Trivy scan fichiers
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

  trivy-image:
    name: Scan image Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t flask-app:latest ./app
      - name: Trivy scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
